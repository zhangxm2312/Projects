<!DOCTYPE html>
<html style="height: 100%">
<head>
    <meta charset="utf-8">
    <title>ECharts Example</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/map/js/china.js"></script>
</head>
<body style="height: 100%; margin: 0">
    <div id="main" style="height: 100%"></div>
    <script type="text/javascript">
        var myChart = echarts.init(document.getElementById('main'));

        var data = {
            "cities": [
                {"name": "北京", "value": 5000},
                {"name": "上海", "value": 4500},
                {"name": "广州", "value": 3000},
                {"name": "深圳", "value": 3500}
            ]
        };

        var geoCoordMap = {
            "北京": [116.40, 39.90],
            "上海": [121.47, 31.23],
            "广州": [113.27, 23.13],
            "深圳": [114.05, 22.55]
        };

        var convertData = function (data) {
            var res = [];
            for (var i = 0; i < data.length; i++) {
                var geoCoord = geoCoordMap[data[i].name];
                if (geoCoord) {
                    res.push({
                        name: data[i].name,
                        value: geoCoord.concat(data[i].value)
                    });
                }
            }
            return res;
        };

        var option = {
            tooltip: {
                trigger: 'item',
                formatter: function (params) {
                    return params.name + ' : ' + params.value[2];
                }
            },
            geo: {
                map: 'china',
                roam: true,
                label: {
                    emphasis: {
                        show: false
                    }
                },
                itemStyle: {
                    normal: {
                        areaColor: 'rgba(128, 128, 128, 0.5)',  // 半透明底图颜色
                        borderColor: '#404a59'
                    },
                    emphasis: {
                        areaColor: '#2a333d'
                    }
                },
                silent: true  // 禁用地图上的鼠标事件
            },
            series: [
                {
                    name: '人数分布',
                    type: 'scatter',
                    coordinateSystem: 'geo',
                    data: convertData(data.cities),
                    symbolSize: function (val) {
                        return val[2] / 500;  // 调整点的大小
                    },
                    itemStyle: {
                        normal: {
                            color: '#ddb926'
                        }
                    }
                }
            ],
            visualMap: {
                min: 0,
                max: 5000,
                left: 'left',
                top: 'bottom',
                text: ['高', '低'],
                calculable: true,
                inRange: {
                    color: ['#50a3ba', '#eac736', '#d94e5d']
                }
            }
        };

        myChart.setOption(option);
    </script>
</body>
</html>
